<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Aice</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/slide-1.css">
  <link rel="stylesheet" href="css/slide-2.css">
  <link rel="stylesheet" href="css/slide-3.css">
  <link rel="stylesheet" href="css/slide-4.css">
</head>
<body>
  <main id="deck">

    <!-- ============ 슬라이드 1 — 인트로 ============ -->
    <section class="slide" id="slide-1">
      <div class="bg">
        <div class="bg-spot"></div>
        <div class="particles" id="s1-particles"></div>
        <div class="bg-vignette"></div>
      </div>

      <div class="stage">
        <div class="label">Team</div>

        <div class="word">
          <span class="letter ai" id="letterA"><span class="ink">A</span></span>
          <span class="slot"><span class="letter ai" id="letterI"><span class="ink">i</span></span></span>
          <span class="letter frame" id="letterC"><span class="ink">c</span></span>
          <span class="letter frame" id="letterE"><span class="ink">e</span></span>
        </div>

        <div class="tagline"><b>AI</b> 시대를 이끌어갈 <b>Ace</b></div>

        <div class="team">
          <div class="member lead">
            <span class="role">팀장</span>
            <span class="name">전승환</span>
            <span class="major">소프트웨어융합전공</span>
          </div>
          <div class="member">
            <span class="role">팀원</span>
            <span class="name">문효은</span>
            <span class="major">환경공학전공</span>
          </div>
          <div class="member">
            <span class="role">팀원</span>
            <span class="name">이승은</span>
            <span class="major">국어국문학과</span>
          </div>
          <div class="member">
            <span class="role">팀원</span>
            <span class="name">조명원</span>
            <span class="major">에너지화공전공</span>
          </div>
        </div>
      </div>
    </section>

    <!-- ============ 슬라이드 2 — 핵심 인사이트 "관리" ============ -->
    <section class="slide" id="slide-2">
      <div class="bg">
        <div class="bg-spot"></div>
        <div class="particles" id="s2-particles"></div>
        <div class="bg-vignette"></div>
      </div>

      <div class="stage">
        <div class="field" id="s2-field"></div>
        <div class="core"><span class="core-ink">관리</span></div>
      </div>
    </section>

    <!-- ============ 슬라이드 3 — 측정 (피터 드러커 인용) ============ -->
    <section class="slide" id="slide-3">
      <div class="bg">
        <div class="bg-spot"></div>
        <div class="particles" id="s3-particles"></div>
        <div class="bg-vignette"></div>
      </div>

      <div class="stage">
        <!-- 좌: 흑백 인물 사진 -->
        <figure class="portrait">
          <img class="portrait-img" src="peter.png" alt="피터 드러커">
          <div class="portrait-fade" aria-hidden="true"></div>
        </figure>

        <!-- 우: 인용구 -->
        <div class="quote">
          <div class="attr">
            <span class="attr-name">PETER F. DRUCKER</span>
            <span class="attr-role">경영학의 아버지</span>
            <span class="attr-rule" aria-hidden="true"></span>
          </div>

          <blockquote class="saying">
            <span class="mark" aria-hidden="true">&#8220;</span>
            <span class="line"><em class="kw" data-kw="measure">측정</em>할 수 없으면 <em class="kw" data-kw="manage">관리</em>할 수 없고,</span>
            <span class="line"><em class="kw" data-kw="manage">관리</em>할 수 없으면 <em class="kw" data-kw="improve">개선</em>할 수 없다.</span>
          </blockquote>
        </div>
      </div>
    </section>

    <!-- ============ 슬라이드 4 — 솔루션 (B-EMS → C-EMS) ============ -->
    <section class="slide" id="slide-4">
      <div class="bg">
        <div class="bg-spot"></div>
        <div class="particles" id="s4-particles"></div>
        <div class="bg-vignette"></div>
      </div>

      <div class="stage">
        <!-- 3D 씬 — 와이어프레임 건물은 JS가 생성 -->
        <div class="scene">
          <div class="world" id="s4-world"></div>
        </div>

        <!-- HUD 텍스트 (3D 위 2D 레이어) -->
        <div class="hud">
          <div class="ems" id="s4-ems" aria-label="C-EMS">
            <span class="ems-pre"><span class="ch ch-c">C</span><span class="ch ch-b">B</span></span><span class="ems-rest">-EMS</span>
          </div>
          <div class="cems-sub">캠퍼스 에너지 관리 시스템</div>
        </div>
      </div>
    </section>

  </main>

  <!-- 라이브러리 · 스크립트 (로컬 · 오프라인) -->
  <script src="vendor/gsap.min.js"></script>
  <script src="js/slide-1.js"></script>
  <script src="js/slide-2.js"></script>
  <script src="js/slide-3.js"></script>
  <script src="js/slide-4.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
